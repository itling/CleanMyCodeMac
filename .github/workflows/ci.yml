name: CI

on:
  push:
  pull_request:

jobs:
  build-and-package:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Show toolchain
        run: |
          xcodebuild -version
          swift --version

      - name: Make scripts executable
        run: chmod +x build_dmg.sh build_icon.sh run.command sign_and_notarize.sh

      - name: Ensure app icon
        run: |
          if [[ -f "resources/app.icns" ]]; then
            echo "Using committed app.icns from repository."
            exit 0
          fi
          ./build_icon.sh

      - name: Build Swift package
        run: swift build

      - name: Build installable app bundle
        run: ./build_dmg.sh arm64
