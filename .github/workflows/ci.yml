name: CI

on:
  push:
  pull_request:

jobs:
  syntax-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Verify Python syntax
        run: |
          python -m py_compile cleanmycodemac/web_app.py cleanmycodemac/utils/i18n.py
          python -m compileall cleanmycodemac
