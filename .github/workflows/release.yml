name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-dmg:
    name: Build DMG (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15-intel
            arch: x86_64
          - runner: macos-14
            arch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Show toolchain
        run: |
          xcodebuild -version
          swift --version

      - name: Make scripts executable
        run: chmod +x build_dmg.sh build_icon.sh sign_and_notarize.sh

      - name: Ensure app icon
        run: |
          if [[ -f "resources/app.icns" ]]; then
            echo "Using committed app.icns from repository."
            exit 0
          fi

          ./build_icon.sh

      - name: Build DMG
        env:
          APP_VERSION: ${{ github.ref_name }}
        run: ./build_dmg.sh ${{ matrix.arch }}

      - name: Import Developer ID certificate
        env:
          APPLE_CERTIFICATE_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          DEVELOPER_ID_APP: ${{ secrets.DEVELOPER_ID_APP }}
        run: |
          if [[ -z "${APPLE_CERTIFICATE_P12:-}" || -z "${APPLE_CERTIFICATE_PASSWORD:-}" || -z "${DEVELOPER_ID_APP:-}" ]]; then
            echo "Signing certificate secrets are not fully configured; skipping certificate import."
            exit 0
          fi

          CERT_PATH="$RUNNER_TEMP/developer-id.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"

          printf '%s' "$APPLE_CERTIFICATE_P12" | /usr/bin/openssl base64 -d -A -out "$CERT_PATH"

          security create-keychain -p "" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" \
            -k "$KEYCHAIN_PATH" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -s -k "" "$KEYCHAIN_PATH"

      - name: Sign and notarize
        env:
          APP_PATH: ${{ github.workspace }}/dist/${{ matrix.arch }}/CleanMyCodeMac.app
          DMG_PATH: ${{ github.workspace }}/dist/CleanMyCodeMac-${{ matrix.arch }}.dmg
          DEVELOPER_ID_APP: ${{ secrets.DEVELOPER_ID_APP }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          TEAM_ID: ${{ secrets.TEAM_ID }}
          APP_PASSWORD: ${{ secrets.APP_PASSWORD }}
        run: |
          if [[ -z "${DEVELOPER_ID_APP:-}" ]]; then
            echo "DEVELOPER_ID_APP is not configured; publishing unsigned DMG."
            exit 0
          fi

          ./sign_and_notarize.sh

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v6
        with:
          name: dmg-${{ matrix.arch }}
          path: dist/CleanMyCodeMac-${{ matrix.arch }}.dmg
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    needs: build-dmg
    runs-on: ubuntu-latest

    steps:
      - name: Download DMG artifacts
        uses: actions/download-artifact@v6
        with:
          pattern: dmg-*
          merge-multiple: true
          path: dist

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.dmg
          generate_release_notes: true
